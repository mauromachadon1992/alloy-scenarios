# Load necessary modules
module(load="imudp")   # For receiving UDP messages
input(type="imudp" port="514" ruleset="network_devices")

# Template principal RFC5424 con app-name NIL (corrige el error de parsing)
template(name="nilAppTemplate" type="string" 
    string="<%PRI%>1 %TIMESTAMP:::date-rfc3339% %HOSTNAME% - %PROCID% %MSGID% - %msg%\n")

# Template RFC5424 con app-name validado
template(name="rfc5424SafeTemplate" type="string" 
    string="<%PRI%>1 %TIMESTAMP:::date-rfc3339% %HOSTNAME% %APP-NAME:::secpath-replace% %PROCID% %MSGID% - %msg%\n")

# Template legacy para dispositivos antiguos
template(name="legacyTemplate" type="string" 
    string="<%PRI%>%TIMESTAMP:::date-rfc3339% %HOSTNAME% %syslogtag%%msg:::sp-if-no-1st-sp%%msg:::drop-last-lf%\n")

# Template con validación completa de app-name
template(name="validatedAppTemplate" type="list") {
    constant(value="<")
    property(name="pri")
    constant(value=">1 ")
    property(name="timestamp" dateFormat="rfc3339")
    constant(value=" ")
    property(name="hostname")
    constant(value=" ")
    # Usar app-name si está disponible y es válido, sino usar NIL (-)
    property(name="app-name" onEmpty="-")
    constant(value=" ")
    property(name="procid" onEmpty="-")
    constant(value=" ")
    property(name="msgid" onEmpty="-")
    constant(value=" - ")
    property(name="msg")
    constant(value="\n")
}

# Template para debug
template(name="debugTemplate" type="list") {
    constant(value="[DEBUG] ")
    property(name="timestamp" dateFormat="rfc3339")
    constant(value=" HOST:")
    property(name="hostname")
    constant(value=" APP:")
    property(name="app-name")
    constant(value=" MSG:")
    property(name="msg")
    constant(value="\n")
}

ruleset(name="network_devices") {
    
    # Logging local para debug
    *.* /var/log/network-devices.log;debugTemplate
    
    # === DISPOSITIVOS OLT ===
    if ($hostname contains "olt" or $hostname contains "OLT" or $fromhost-ip contains "192.168.1.") then {
        # OLT generalmente soporta RFC5424
        *.* action(type="omfwd" target="alloy" port="51893" protocol="tcp" template="nilAppTemplate" TCP_Framing="octet-counted" KeepAlive="on" queue.type="linkedlist" queue.size="10000" action.resumeRetryCount="-1" action.reportSuspension="on")
        stop
    }
    
    # === SWITCHES DATACOM ===
    if ($hostname contains "switch" or $hostname contains "datacom" or 
        $hostname contains "DATACOM" or $hostname contains "SWITCH" or
        $fromhost-ip contains "192.168.2.") then {
        # Switches Datacom pueden necesitar template legacy
        *.* action(type="omfwd" target="alloy" port="51893" protocol="tcp" template="legacyTemplate" TCP_Framing="octet-counted" KeepAlive="on" queue.type="linkedlist" queue.size="10000" action.resumeRetryCount="-1" action.reportSuspension="on")
        stop
    }
    
    # === DISPOSITIVOS MIKROTIK ===
    if ($hostname contains "mikrotik" or $hostname contains "routeros" or 
        $hostname contains "MIKROTIK" or $programname contains "routeros" or
        $fromhost-ip contains "192.168.3.") then {
        # Mikrotik RouterOS soporta RFC5424
        *.* action(type="omfwd" target="alloy" port="51893" protocol="tcp" template="nilAppTemplate" TCP_Framing="octet-counted" KeepAlive="on" queue.type="linkedlist" queue.size="10000" action.resumeRetryCount="-1" action.reportSuspension="on")
        stop
    }
    
    # === FILTROS POR SEVERIDAD ===
    # Logs críticos siempre se envían
    if ($syslogseverity <= 2) then {
        *.* action(type="omfwd" target="alloy" port="51893" protocol="tcp" template="nilAppTemplate" TCP_Framing="octet-counted" KeepAlive="on" queue.type="linkedlist" queue.size="10000")
        stop
    }
    
    # === FALLBACK PARA OTROS DISPOSITIVOS ===
    # Para dispositivos no identificados, usar template seguro
    *.* action(type="omfwd" target="alloy" port="51893" protocol="tcp" template="nilAppTemplate" TCP_Framing="octet-counted" KeepAlive="on" queue.type="linkedlist" queue.size="10000"action.resumeRetryCount="-1" action.reportSuspension="on")
}
