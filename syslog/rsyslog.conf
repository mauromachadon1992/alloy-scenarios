# Load necessary modules
module(load="imudp")   # For receiving UDP messages
module(load="omfwd")   # For forwarding messages
input(type="imudp" port="514")

# Template personalizado para manejar app-name vacío
template(name="fixedAppName" type="string" 
         string="<%PRI%>1 %TIMESTAMP:::date-rfc3339% %HOSTNAME% - %PROCID% %MSGID% %STRUCTURED-DATA% %msg%\n")

# Template para app-name válido
template(name="validAppName" type="string" 
         string="<%PRI%>1 %TIMESTAMP:::date-rfc3339% %HOSTNAME% %app-name% %PROCID% %MSGID% %STRUCTURED-DATA% %msg%\n")

# Reglas condicionales para manejar app-name
if ($app-name == "" or not isset($app-name)) then {
    action(type="omfwd" target="alloy" port="51893" protocol="tcp" 
           template="fixedAppName" TCP_Framing="octet-counted" KeepAlive="on")
} else {
    action(type="omfwd" target="alloy" port="51893" protocol="tcp" 
           template="validAppName" TCP_Framing="octet-counted" KeepAlive="on")
}
