# Load necessary modules
module(load="imudp")   # For receiving UDP messages
input(type="imudp" port="514")

# Template seguro que sempre usa "-" para app-name quando vazio
template(name="safeTemplate" type="string" string="<%PRI%>1 %TIMESTAMP:::date-rfc3339% %HOSTNAME% - %PROCID% %MSGID% %STRUCTURED-DATA% %msg%\n")

# TCP endpoint configuration usando template seguro
*.* action(type="omfwd" target="alloy" port="51893" protocol="tcp" template="safeTemplate" TCP_Framing="octet-counted" KeepAlive="on")
