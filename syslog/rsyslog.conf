# Load necessary modules
module(load="imudp")   # For receiving UDP messages
input(type="imudp" port="514" ruleset="network_devices")

# Template principal para dispositivos de rede (RFC5424 compliant)
template(name="rfc5424Template" type="string" string="<%PRI%>1 %TIMESTAMP:::date-rfc3339% %HOSTNAME% %APP-NAME% %PROCID% %MSGID% %STRUCTURED-DATA% %msg%\n")

# Template alternativo para dispositivos que não suportam RFC5424
template(name="legacyTemplate" type="string" string="<%PRI%>%TIMESTAMP:::date-rfc3339% %HOSTNAME% %syslogtag%%msg:::sp-if-no-1st-sp%%msg:::drop-last-lf%\n")

# Template específico para debug
template(name="debugTemplate" type="list") {
    constant(value="[DEBUG] ")
    property(name="timestamp" dateFormat="rfc3339")
    constant(value=" HOST:")
    property(name="hostname")
    constant(value=" APP:")
    property(name="app-name")
    constant(value=" MSG:")
    property(name="msg")
    constant(value="\n")
}

ruleset(name="network_devices") {
    # Filtrar por tipo de dispositivo e aplicar template apropriado
    
    # OLT - geralmente usa formato padrão
    if ($hostname contains "olt" or $hostname contains "OLT") then {
        *.* action(type="omfwd" target="alloy" port="51893" protocol="tcp" template="rfc5424Template" TCP_Framing="octet-counted" KeepAlive="on" queue.type="linkedlist" queue.size="10000")
        stop
    }
    
    # Switch Datacom - pode precisar de template legacy
    if ($hostname contains "switch" or $hostname contains "datacom" or $hostname contains "DATACOM") then {
        *.* action(type="omfwd" target="alloy" port="51893" protocol="tcp" template="legacyTemplate" TCP_Framing="octet-counted" KeepAlive="on" queue.type="linkedlist" queue.size="10000")
        stop
    }
    
    # Mikrotik RouterOS - formato específico
    if ($hostname contains "mikrotik" or $hostname contains "routeros" or $programname contains "routeros") then {
        *.* action(type="omfwd" target="alloy" port="51893" protocol="tcp" template="rfc5424Template" TCP_Framing="octet-counted" KeepAlive="on" queue.type="linkedlist" queue.size="10000")
        stop
    }
    
    # Fallback para outros dispositivos
    *.* action(type="omfwd" target="alloy" port="51893" protocol="tcp" template="rfc5424Template" TCP_Framing="octet-counted" KeepAlive="on" queue.type="linkedlist" queue.size="10000")
}
